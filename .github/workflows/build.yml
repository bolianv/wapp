name: Build Apps

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup mc and download code
        run: |
          curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc && mv mc /usr/local/bin/
          mc alias set minio ${{ secrets.MINIO_ENDPOINT }} ${{ secrets.MINIO_ACCESS_KEY }} ${{ secrets.MINIO_SECRET_KEY }}
          mc cp minio/wapp/code/code.tar.gz /tmp/code.tar.gz
          tar xzf /tmp/code.tar.gz -C ${{ github.workspace }}

      # 缓存：Android SDK（setup-android 默认安装到 ~/.android/sdk）
      - name: Cache Android SDK
        id: cache-android
        uses: actions/cache@v4
        with:
          path: ~/.android/sdk
          key: Linux-android-sdk-34-v1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools platforms;android-34 build-tools;34.0.0

      - name: Set Android env
        if: steps.cache-android.outputs.cache-hit == 'true'
        run: |
          echo "ANDROID_HOME=$HOME/.android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/.android/sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/.android/sdk/cmdline-tools/16.0/bin:$HOME/.android/sdk/platform-tools:$HOME/.android/sdk/build-tools/34.0.0:$PATH" >> $GITHUB_ENV

      # 3. 运行 make build 打包
      - name: Build Packages
        run: make build URLS="${{ secrets.API_URL }}" JOBS=2 PLATFORM=apk > /dev/null

      - name: Upload outputs to S3
        run: mc cp -r outputs/ minio/wapp/outputs/