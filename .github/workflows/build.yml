name: Build Apps

# 由 Gitea 侧通过推送 workflow 文件到 master 来触发。
# 具体构建渠道（dev / prd）由 minio 中的 `code/build_tag` 标记文件决定，
# Gitea 的 tag push（dev* / prd*）会把 tag 名写到那个文件里。
on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Setup mc
        uses: hostwithquantum/setup-mc@v1.1.0
        with:
          dl-url: https://dl.min.io/community/client/mc/release/linux-amd64/mc.RELEASE.2025-08-13T08-35-41Z
          alias-name: minio
          alias-url: ${{ secrets.MINIO_ENDPOINT }}
          alias-access-key: ${{ secrets.MINIO_ACCESS_KEY }}
          alias-secret-key: ${{ secrets.MINIO_SECRET_KEY }}

      - name: Download and extract code
        run: |
          mc cp minio/wapp/code/code.tar.gz /tmp/code.tar.gz
          tar xzf /tmp/code.tar.gz -C ${{ github.workspace }}

      - name: Resolve build channel from tag marker
        run: |
          # 从 minio 读取 Gitea 写入的 tag 名，按前缀决定渠道：
          #   dev* → 打 debug + release 双包（仍仅写 outputs-dev/，不覆盖线上 latest.txt）
          #   prd* → 仅 release，写 outputs/ 并更新 latest.txt
          #   读不到或未匹配 → 保守当作 dev，避免误上线
          BUILD_TAG=""
          if mc cat minio/wapp/code/build_tag.txt > /tmp/build_tag 2>/dev/null; then
            BUILD_TAG=$(tr -d '[:space:]' < /tmp/build_tag || true)
          fi
          case "$BUILD_TAG" in
            prd*)
              CHANNEL="prd"
              BUILD_TYPE="release"
              ;;
            dev*)
              CHANNEL="dev"
              BUILD_TYPE="debug"
              ;;
            *)
              CHANNEL="dev"
              BUILD_TYPE="debug"
              ;;
          esac
          echo "BUILD_TAG=$BUILD_TAG"   >> $GITHUB_ENV
          echo "CHANNEL=$CHANNEL"       >> $GITHUB_ENV
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_ENV
          echo "resolved: tag='${BUILD_TAG}' channel=${CHANNEL} build_type=${BUILD_TYPE}"

      # 缓存：Android SDK（setup-android 默认安装到 ~/.android/sdk）
      - name: Cache Android SDK
        id: cache-android
        uses: actions/cache@v4
        with:
          path: ~/.android/sdk
          key: Linux-android-sdk-34-v1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        if: steps.cache-android.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools platforms;android-34 build-tools;34.0.0

      - name: Set Android env
        if: steps.cache-android.outputs.cache-hit == 'true'
        run: |
          echo "ANDROID_HOME=$HOME/.android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/.android/sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/.android/sdk/cmdline-tools/16.0/bin:$HOME/.android/sdk/platform-tools:$HOME/.android/sdk/build-tools/34.0.0:$PATH" >> $GITHUB_ENV

      - name: Setup links
        run: bash scripts/1.setup-links.sh  > /dev/null

      - name: Build Packages (dev, debug + release)
        if: env.CHANNEL == 'dev'
        run: |
          set -e
          # 两次 api-build 需共用 WEBVIEW_BUILD_TIME_SUFFIX，使两种 APK 落在同一 outputs/{id}/{date}/
          export WEBVIEW_BUILD_TIME_SUFFIX=$(date +%H%M)
          make build URLS="${{ secrets.API_URL }}" JOBS=2 PLATFORM=apk BUILD_TYPE=debug > /dev/null
          make build URLS="${{ secrets.API_URL }}" JOBS=2 PLATFORM=apk BUILD_TYPE=release > /dev/null

      - name: Build Packages (single)
        if: env.CHANNEL == 'prd'
        run: make build URLS="${{ secrets.API_URL }}" JOBS=2 PLATFORM=apk BUILD_TYPE="${BUILD_TYPE}" > /dev/null

      - name: Upload outputs to S3
        run: |
          # 渠道：dev → outputs-dev/；prd → outputs/
          BASE_KEY="outputs"
          if [ "$CHANNEL" = "dev" ]; then
            BASE_KEY="outputs-dev"
            BINFO="debug+release"
          else
            BINFO="${BUILD_TYPE}"
          fi
          for id_dir in outputs/*/; do
            id=$(basename "$id_dir")
            # 目录名格式为 {VERNUM}{HHMM}，精度到分；同一次构建中同一 id 理论上只会有一个，
            # 若存在多个（例如本地调试残留），按修改时间取最新。
            date_dir=$(ls -dt "${id_dir}"*/ 2>/dev/null | head -1)
            [ -z "$date_dir" ] && continue
            date=$(basename "$date_dir")
            mc cp -r "$date_dir" "minio/wapp/${BASE_KEY}/${id}/${date}/"
            echo -n "$date|apk" > /tmp/latest
            mc cp /tmp/latest "minio/wapp/${BASE_KEY}/${id}/latest.txt"
          done
          echo "[${CHANNEL}] uploaded (tag=${BUILD_TAG}, build_type=${BINFO}, base=${BASE_KEY})"
